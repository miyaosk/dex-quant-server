<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} - DEX Quant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
                        profit: '#22c55e',
                        loss: '#ef4444',
                        surface: { 0: '#0f1117', 1: '#161b22', 2: '#1c2333', 3: '#242c3d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .glass { background: rgba(22,27,34,0.8); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.15); }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.15); }
        .sidebar-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 0.5rem; color: #94a3b8; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(99,102,241,0.1); color: #818cf8; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex">
    <aside class="w-56 glass border-r border-slate-800 flex flex-col p-4 sticky top-0 h-screen">
        <a href="/admin/" class="flex items-center gap-2 text-lg font-bold text-brand-400 mb-6 px-1">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>
            管理后台
        </a>
        <nav class="flex flex-col gap-1 text-sm flex-1">
            <a href="/admin/" class="sidebar-link {% block sidebar_dashboard %}{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                数据概览
            </a>
            <a href="/admin/users" class="sidebar-link {% block sidebar_users %}{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                用户管理
            </a>
            <a href="/admin/monitors" class="sidebar-link {% block sidebar_monitors %}{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                监控管理
            </a>
            <a href="/admin/strategies" class="sidebar-link {% block sidebar_strategies %}{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                策略管理
            </a>
            <a href="/admin/backtests" class="sidebar-link {% block sidebar_backtests %}{% endblock %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                回测管理
            </a>
        </nav>
        <div class="border-t border-slate-800 pt-3 mt-3">
            <a href="/" class="sidebar-link text-xs">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                返回前台
            </a>
            <a href="/admin/logout" class="sidebar-link text-xs text-red-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                退出登录
            </a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-h-screen">
        <header class="glass border-b border-slate-800 px-6 py-3 flex items-center justify-between">
            <h1 class="text-lg font-semibold">{% block page_title %}{% endblock %}</h1>
            <span class="text-xs text-slate-500">管理员</span>
        </header>
        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
